<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES</title>
</head>
<style>
    body {
        background-image: url('https://parade.com/.image/w_3840,q_auto:good,c_limit/ODowMDAwMDAwMDAxNTYzNDMz/aries-horoscope-sign-in-twelve-zodiac-with-galaxy-stars-background-graphic-of-polygon-man-thinking-stockpack-gettyimages.jpg?arena_f_auto');
        background-position: center;
        background-size: cover;
        color: rgb(255, 255, 255);
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 50px;
    }


    .btn {
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid #ff0000;
        box-shadow: 0 0 20px #ff0000;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.3s;
    }

    .btn:hover {
        transform: translateY(-10px);
        background-color: #ff0000;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }


    .card {
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid #ff0000;
        border-radius: 15px;
        max-width: 500px;
        margin: 0 auto;
        padding: 30px;
        box-shadow: 0 0 20px #ff0000;
    }


    .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 4px solid #ff0000;
        object-fit: cover;
        margin-bottom: 15px;
    }


    h1 {
        color: #ff0000;
        text-shadow: 0 0 10px #ff0000;
        font-size: 2.5rem;
        margin-bottom: 5px;
    }

    .dates {
        color: #ddd;
        font-size: 1.1rem;
        margin-bottom: 20px;
    }


    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #555;
        text-align: left;
    }

    .label {
        color: #ffcc00;
        font-weight: bold;
    }

    .traits {
        margin-top: 20px;
        text-align: left;
    }

    .traits h3 {
        color: #ff0000;
        border-bottom: 2px solid #ff0000;
        padding-bottom: 5px;
    }

    ul {
        list-style-type: square;
        padding-left: 20px;
    }

    li {
        margin-bottom: 5px;
    }
</style>

<body>

    <div class="card">
        <img src="https://thumbs.dreamstime.com/b/fiery-depiction-aries-zodiac-sign-featuring-stylized-ram-glowing-eyes-bold-curved-horns-has-vivid-red-mane-412841264.jpg"
            class="profile-img" alt="Ram">

        <h1>ARIES</h1>
        <p class="dates">March 21 — April 19</p>

        <table>
            <tr>
                <td class="label">Element:</td>
                <td>Fire</td>
            </tr>
            <tr>
                <td class="label">Ruling Planet:</td>
                <td>Mars</td>
            </tr>
            <tr>
                <td class="label">Symbol:</td>
                <td>The Ram</td>
            </tr>
            <tr>
                <td class="label">Lucky Color:</td>
                <td>Red</td>
            </tr>
            <tr>
                <td class="label">Lucky Numbers:</td>
                <td>1, 9, 19</td>
            </tr>
        </table>

        <div class="traits">
            <h3>Strengths</h3>
            <ul>
                <li>Brave</li>
                <li>Determined</li>
                <li>Confident</li>
                <li>Honest</li>
            </ul>

            <h3>Weaknesses</h3>
            <ul>
                <li>Impatient</li>
                <li>Moody</li>
                <li>Short-tempered</li>
                <li>Impulsive</li>
            </ul>
        </div>

        <a href="home page.html" class="btn">EXIT</a>
    </div>

</body>

</html>
