<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANCER</title>
</head>
<style>
    body {
        background-image: url('https://static.dir.bg/uploads/images/2022/03/04/2318583/1920x1080.jpg?_=1646395163');
        background-position: center;
        background-size: cover;
        color: rgb(255, 255, 255);
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 50px;
    }


    .btn {
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid #C0C0C0;
        box-shadow: 0 0 20px #C0C0C0;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.3s;
    }

    .btn:hover {
        transform: translateY(-10px);
        background-color: #C0C0C0;
        color: black;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }


    .card {
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid #C0C0C0;
        border-radius: 15px;
        max-width: 500px;
        margin: 0 auto;
        padding: 30px;
        box-shadow: 0 0 20px #C0C0C0;
    }


    .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 4px solid #C0C0C0;
        object-fit: cover;
        margin-bottom: 15px;
    }


    h1 {
        color: #C0C0C0;
        text-shadow: 0 0 10px #C0C0C0;
        font-size: 2.5rem;
        margin-bottom: 5px;
    }

    .dates {
        color: #ddd;
        font-size: 1.1rem;
        margin-bottom: 20px;
    }


    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #555;
        text-align: left;
    }

    .label {
        color: #e100ff;
        font-weight: bold;
    }

    .traits {
        margin-top: 20px;
        text-align: left;
    }

    .traits h3 {
        color: #C0C0C0;
        border-bottom: 2px solid #C0C0C0;
        padding-bottom: 5px;
    }

    ul {
        list-style-type: square;
        padding-left: 20px;
    }

    li {
        margin-bottom: 5px;
    }
</style>

<body>

    <div class="card">
        <img src="https://happywoman.bg/wp-content/uploads/2022/02/za-mesec-Rak.jpg" class="profile-img" alt="Ram">

        <h1>CANCER</h1>
        <p class="dates">June 21 – July 22</p>

        <table>
            <tr>
                <td class="label">Element:</td>
                <td>Water</td>
            </tr>
            <tr>
                <td class="label">Ruling Planet:</td>
                <td>Moon
                </td>
            </tr>
            <tr>
                <td class="label">Symbol:</td>
                <td>The Crab</td>
            </tr>
            <tr>
                <td class="label">Lucky Color:</td>
                <td>Silver, White</td>
            </tr>
            <tr>
                <td class="label">Lucky Numbers:</td>
                <td>2, 7, 11, 16, 20</td>
            </tr>
        </table>

        <div class="traits">
            <h3>Strengths</h3>
            <ul>
                <li>Emotional / Intuitive</li>
                <li>Loyal</li>
                <li>Protective</li>
                <li>Caring / Nurturing</li>
            </ul>

            <h3>Weaknesses</h3>
            <ul>
                <li>Moody</li>
                <li>Overly sensitive</li>
                <li>Pessimistic</li>
                <li>Clingy</li>
            </ul>
        </div>

        <a href="home page.html" class="btn">EXIT</a>
    </div>

</body>

</html>
