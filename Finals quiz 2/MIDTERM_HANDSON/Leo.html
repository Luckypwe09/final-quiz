<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEO</title>
</head>
<style>
    body {
        background-image: url('https://wallpapers.com/images/hd/leo-zodiac-untlb1al6y8cmygt.jpg');
        background-position: center;
        background-size: cover;
        color: rgb(255, 255, 255);
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 50px;
    }


    .btn {
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid #FFD700;
        box-shadow: 0 0 20px #FFD700;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.3s;
    }

    .btn:hover {
        transform: translateY(-10px);
        background-color: #FFD700;
        color: black;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }


    .card {
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid #FFD700;
        border-radius: 15px;
        max-width: 500px;
        margin: 0 auto;
        padding: 30px;
        box-shadow: 0 0 20px #FFD700;
    }


    .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 4px solid #FFD700;
        object-fit: cover;
        margin-bottom: 15px;
    }


    h1 {
        color: #FFD700;
        text-shadow: 0 0 10px #FFD700;
        font-size: 2.5rem;
        margin-bottom: 5px;
    }

    .dates {
        color: #ddd;
        font-size: 1.1rem;
        margin-bottom: 20px;
    }


    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #555;
        text-align: left;
    }

    .label {
        color: #00ff22;
        font-weight: bold;
    }

    .traits {
        margin-top: 20px;
        text-align: left;
    }

    .traits h3 {
        color: #FFD700;
        border-bottom: 2px solid #FFD700;
        padding-bottom: 5px;
    }

    ul {
        list-style-type: square;
        padding-left: 20px;
    }

    li {
        margin-bottom: 5px;
    }
</style>

<body>

    <div class="card">
        <img src="https://www.greekmythology.com/images/mythology/leo_image_632.jpg" class="profile-img" alt="Ram">

        <h1>LEO</h1>
        <p class="dates">July 23 – August 22</p>

        <table>
            <tr>
                <td class="label">Element:</td>
                <td>Fire</td>
            </tr>
            <tr>
                <td class="label">Ruling Planet:</td>
                <td>Sun
                </td>
            </tr>
            <tr>
                <td class="label">Symbol:</td>
                <td>The Lion</td>
            </tr>
            <tr>
                <td class="label">Lucky Color:</td>
                <td>Gold, Orange, Yellow</td>
            </tr>
            <tr>
                <td class="label">Lucky Numbers:</td>
                <td>1, 4, 10, 19, 22</td>
            </tr>
        </table>

        <div class="traits">
            <h3>Strengths</h3>
            <ul>
                <li>Confident</li>
                <li>Natural leader</li>
                <li>Charismatic</li>
                <li>Generous</li>
            </ul>

            <h3>Weaknesses</h3>
            <ul>
                <li>Arrogant</li>
                <li>Stubborn</li>
                <li>Attention-seeking</li>
                <li>Dominating</li>
            </ul>
        </div>

        <a href="home page.html" class="btn">EXIT</a>
    </div>

</body>

</html>
