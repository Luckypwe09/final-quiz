<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAURUS</title>
</head>
<style>
    body {
        background-image: url('https://media.istockphoto.com/id/1383849196/photo/taurus-horoscope-sign-in-twelve-zodiac.jpg?s=612x612&w=0&k=20&c=UDJM1DojZP04ZJ038Ouy580beZ873EkLklbdIA05pr8=');
        background-position: center;
        background-size: cover;
        color: rgb(255, 255, 255);
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 50px;
    }


    .btn {
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid #FFC0CB;
        box-shadow: 0 0 20px #FFC0CB;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.3s;
    }

    .btn:hover {
        transform: translateY(-10px);
        background-color: #FFC0CB;
        color: black;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }


    .card {
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid #FFC0CB;
        border-radius: 15px;
        max-width: 500px;
        margin: 0 auto;
        padding: 30px;
        box-shadow: 0 0 20px #FFC0CB;
    }


    .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 4px solid #FFC0CB;
        object-fit: cover;
        margin-bottom: 15px;
    }


    h1 {
        color: #FFC0CB;
        text-shadow: 0 0 10px #FFC0CB;
        font-size: 2.5rem;
        margin-bottom: 5px;
    }

    .dates {
        color: #ddd;
        font-size: 1.1rem;
        margin-bottom: 20px;
    }


    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #555;
        text-align: left;
    }

    .label {
        color: #00ff88;
        font-weight: bold;
    }

    .traits {
        margin-top: 20px;
        text-align: left;
    }

    .traits h3 {
        color: #FFC0CB;
        border-bottom: 2px solid #FFC0CB;
        padding-bottom: 5px;
    }

    ul {
        list-style-type: square;
        padding-left: 20px;
    }

    li {
        margin-bottom: 5px;
    }
</style>

<body>

    <div class="card">
        <img src="https://www.greekmythology.com/images/mythology/taurus_image_629.jpg" class="profile-img" alt="Ram">

        <h1>TAURUS</h1>
        <p class="dates">April 20 – May 20</p>

        <table>
            <tr>
                <td class="label">Element:</td>
                <td>Earth</td>
            </tr>
            <tr>
                <td class="label">Ruling Planet:</td>
                <td>Venus
                </td>
            </tr>
            <tr>
                <td class="label">Symbol:</td>
                <td>The Bull</td>
            </tr>
            <tr>
                <td class="label">Lucky Color:</td>
                <td>Green, Pink</td>
            </tr>
            <tr>
                <td class="label">Lucky Numbers:</td>
                <td>2, 6, 9, 12, 24</td>
            </tr>
        </table>

        <div class="traits">
            <h3>Strengths</h3>
            <ul>
                <li>Reliable</li>
                <li>Patient</li>
                <li>Practical</li>
                <li>Devoted</li>
            </ul>

            <h3>Weaknesses</h3>
            <ul>
                <li>Possessive</li>
                <li>Materialistic</li>
                <li>Resistant to change</li>
                <li>Stubborn</li>
            </ul>
        </div>

        <a href="home page.html" class="btn">EXIT</a>
    </div>

</body>

</html>
